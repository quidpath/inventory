services:
  db:
    image: postgres:15
    container_name: postgres_inventory_stage
    restart: unless-stopped
    volumes:
      - /mnt/ebs/inventory/postgres_db_stage_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory_network

  redis:
    image: redis:7-alpine
    container_name: inventory_redis_stage
    restart: unless-stopped
    networks:
      - inventory_network

  backend:
    image: ${IMAGE_TAG}
    container_name: inventory-backend-stage
    restart: unless-stopped
    ports:
      - "127.0.0.1:8015:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres_inventory_stage
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      INVENTORY_SERVICE_SECRET: ${INVENTORY_SERVICE_SECRET}
      ERP_SERVICE_SECRET: ${ERP_SERVICE_SECRET}
      POS_SERVICE_SECRET: ${POS_SERVICE_SECRET}
      CRM_SERVICE_SECRET: ${CRM_SERVICE_SECRET}
      HRM_SERVICE_SECRET: ${HRM_SERVICE_SECRET}
      PROJECTS_SERVICE_SECRET: ${PROJECTS_SERVICE_SECRET}
      BILLING_SERVICE_SECRET: ${BILLING_SERVICE_SECRET}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: inventory_service.settings.stage
      DJANGO_ENV: stage
    volumes:
      - /mnt/ebs/inventory/media_stage:/app/media
      - /mnt/ebs/inventory/staticfiles_stage:/app/staticfiles
    networks:
      - inventory_network
      - quidpath_network

  celery:
    image: ${IMAGE_TAG}
    container_name: inventory-celery-stage
    restart: unless-stopped
    command: celery -A inventory_service worker -l info
    depends_on:
      - redis
      - backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres_inventory_stage
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      INVENTORY_SERVICE_SECRET: ${INVENTORY_SERVICE_SECRET}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: inventory_service.settings.stage
    networks:
      - inventory_network
      - quidpath_network

networks:
  inventory_network:
    name: inventory_stage_network
    driver: bridge
  quidpath_network:
    external: true
    name: stage_quidpath_network