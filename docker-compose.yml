services:
  db:
    image: postgres:15
    container_name: postgres_inventory_prod
    restart: unless-stopped
    volumes:
      - /mnt/ebs/inventory_prod/postgres_prod_data_v2:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory_network

  redis:
    image: redis:7-alpine
    container_name: inventory_redis
    restart: unless-stopped
    networks:
      - inventory_network

  backend:
    image: ${IMAGE_TAG}
    container_name: inventory-backend-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8014:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres_inventory_prod
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      INVENTORY_SERVICE_SECRET: ${INVENTORY_SERVICE_SECRET}
      ERP_SERVICE_SECRET: ${ERP_SERVICE_SECRET}
      POS_SERVICE_SECRET: ${POS_SERVICE_SECRET}
      CRM_SERVICE_SECRET: ${CRM_SERVICE_SECRET}
      HRM_SERVICE_SECRET: ${HRM_SERVICE_SECRET}
      PROJECTS_SERVICE_SECRET: ${PROJECTS_SERVICE_SECRET}
      BILLING_SERVICE_SECRET: ${BILLING_SERVICE_SECRET}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: inventory_service.settings.prod
      DJANGO_ENV: prod
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      ERP_BACKEND_URL: ${ERP_BACKEND_URL}
      POS_SERVICE_URL: ${POS_SERVICE_URL}
      CRM_SERVICE_URL: ${CRM_SERVICE_URL}
      HRM_SERVICE_URL: ${HRM_SERVICE_URL}
      PROJECTS_SERVICE_URL: ${PROJECTS_SERVICE_URL}
    volumes:
      - /mnt/ebs/inventory/media:/app/media
      - /mnt/ebs/inventory/staticfiles:/app/staticfiles
    networks:
      - inventory_network
      - quidpath_network

  celery:
    image: ${IMAGE_TAG}
    container_name: inventory-celery-prod
    restart: unless-stopped
    command: celery -A inventory_service worker -l info
    depends_on:
      - redis
      - backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres_inventory_prod
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      INVENTORY_SERVICE_SECRET: ${INVENTORY_SERVICE_SECRET}
      ERP_SERVICE_SECRET: ${ERP_SERVICE_SECRET}
      POS_SERVICE_SECRET: ${POS_SERVICE_SECRET}
      CRM_SERVICE_SECRET: ${CRM_SERVICE_SECRET}
      HRM_SERVICE_SECRET: ${HRM_SERVICE_SECRET}
      PROJECTS_SERVICE_SECRET: ${PROJECTS_SERVICE_SECRET}
      BILLING_SERVICE_SECRET: ${BILLING_SERVICE_SECRET}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: inventory_service.settings.prod
      ERP_BACKEND_URL: ${ERP_BACKEND_URL}
      POS_SERVICE_URL: ${POS_SERVICE_URL}
      CRM_SERVICE_URL: ${CRM_SERVICE_URL}
      HRM_SERVICE_URL: ${HRM_SERVICE_URL}
      PROJECTS_SERVICE_URL: ${PROJECTS_SERVICE_URL}
    networks:
      - inventory_network
      - quidpath_network

networks:
  inventory_network:
    name: inventory_prod_network
    driver: bridge
  quidpath_network:
    name: prod_quidpath_network
    driver: bridge
    # Docker Compose will create this network if it doesn't exist
    # or reuse it if another service already created it
