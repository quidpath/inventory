services:
  db:
    image: postgres:15
    container_name: postgres_inventory_dev
    restart: unless-stopped
    ports:
      - "5437:5432"
    volumes:
      - postgres_inventory_dev_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory_dev_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory-backend-dev
    restart: unless-stopped
    ports:
      - "8004:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: inventory_service.settings.dev
      DJANGO_ENV: dev
      DEBUG: "true"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,*"
      DATABASE_URL: "postgresql://devuser:devpass@db:5432/devdb"
      SECRET_KEY: "local-dev-secret-key"
      JWT_SECRET_KEY: "local-jwt-secret"
      SERVICE_SECRET: "local-service-secret"
    volumes:
      - .:/app
      - media_dev:/app/media
      - staticfiles_dev:/app/staticfiles
    networks:
      - inventory_dev_network

networks:
  inventory_dev_network:
    driver: bridge

volumes:
  postgres_inventory_dev_data:
  media_dev:
  staticfiles_dev:
